<div class="app-container">
  
  <div class="top-nav-bar">
    <div class="user-greeting">
      <div class="icon-box">
        <span class="greeting-emoji">🎒</span>
      </div>
      <div class="greeting-text">
        <span class="sub-text">Hey there!</span>
        <span class="main-text">Welcome Back</span>
      </div>
    </div>
    <div class="profile-pic">
      <div class="avatar-circle">M</div>
    </div>
  </div>

  <main class="page-content home-page">
    
    <!-- Search Bar -->
    <div class="search-container">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Rechercher un symptôme..." disabled />
      </div>
      <button class="filter-btn">
        <svg fill="currentColor" viewBox="0 0 24 24" width="24" height="24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
      </button>
    </div>

    <!-- Green Hero Card (matching the specific strong dark green #204131 vibe) -->
    <div class="hero-card green-card">
      <div class="card-header">
        <span class="pill-tag">Bilan Rapide</span>
        <span class="bookmark-icon">🔖</span>
      </div>
      <div class="card-body">
        <h2 class="card-title">Évaluer mon risque main</h2>
        <p class="card-subtitle">Répondez à quelques questions pour évaluer votre prédisposition.</p>
      </div>
      <div class="card-footer">
        <div class="stats">
          <div class="stat"><span class="val">5</span><span class="lbl">Questions</span></div>
          <div class="stat"><span class="val">1 min</span><span class="lbl">Rapide</span></div>
        </div>
        <button class="btn-accent-orange" (click)="goToPath('/questionnaire')">
          Commencer le bilan
        </button>
      </div>
    </div>

    <!-- Chips / Categories -->
    <div class="category-chips">
      <button class="chip active">Symptômes</button>
      <button class="chip">Traitements</button>
      <button class="chip">Prévention</button>
    </div>

    <!-- List of features / popular actions -->
    <section class="section">
      <div class="header-with-action">
        <h2 class="section-title">En savoir plus</h2>
      </div>
      
      <div class="list-cards">
        <div class="job-card" *ngFor="let feature of features">
          <div class="job-icon-wrap">
            <span class="job-icon">💡</span>
          </div>
          <div class="job-info">
            <h4 class="job-title">{{ feature }}</h4>
            <span class="job-company">Manuderma Care</span>
          </div>
          <button class="btn-apply-sm">Lire</button>
        </div>
      </div>
    </section>
    
    <div style="height: 100px;"></div>

  </main>

  <app-bottom-nav></app-bottom-nav>
</div>
